name: Sync matches

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Call sync endpoint
        env:
          SYNC_SECRET: ${{ secrets.NUXT_SYNC_SECRET }}
          APP_URL: ${{ secrets.NUXT_APP_URL }}
        run: |
          curl --fail-with-body -X POST \
            -H "x-sync-secret: ${SYNC_SECRET}" \
            "${APP_URL}/api/internal/sync-matches"
